apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: canary-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      enableServiceLinks: false
      containers:
        - name: gateway
          image: canarymlplatformacr32255.azurecr.io/gateway:v1
          ports:
            - containerPort: 8080
            - containerPort: 8081
          env:
            - name: STABLE_UPSTREAM_URL
              value: "http://model-server-stable:8001"
            - name: CANARY_UPSTREAM_URL
              value: "http://model-server-canary:8001"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-data-plane
  namespace: canary-platform
spec:
  type: LoadBalancer
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gw-admin
  namespace: canary-platform
spec:
  type: ClusterIP
  selector:
    app: gateway
  ports:
    - port: 8081
      targetPort: 8081
