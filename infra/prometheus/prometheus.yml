global:
  scrape_interval: 15s

scrape_configs:
  - job_name: model-server-stable
    static_configs:
      - targets: ["model-server-stable:8001"]
        labels:
          model_version_label: stable

  - job_name: model-server-canary
    static_configs:
      - targets: ["model-server-canary:8001"]
        labels:
          model_version_label: canary

  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]